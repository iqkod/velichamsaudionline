            const [user, setUser] = useState(null);

            const [regData, setRegData] = useState({ name: '', place: '', mobile: '' });
            const [currentQ, setCurrentQ] = useState(0);
            const [answers, setAnswers] = useState({});

                        setFb(window.EXAM_APP);

                    }
                }, 100);
                return () => clearInterval(checkFB);
            }, []);

            useEffect(() => {
                if (!fb) return;
                const initAuth = async () => {
                    try {
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await fb.firebase.signInWithCustomToken(fb.auth, token);
                        else await fb.firebase.signInAnonymously(fb.auth);
                        
                        fb.firebase.onAuthStateChanged(fb.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    } catch (e) {
                        console.error("Auth Fail", e);
                        setLoading(false);
                    }
                };
                initAuth();
            }, [fb]);

            useEffect(() => {
                if (!fb || !user) return;
                const q = fb.firebase.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'exam_results');
                return fb.firebase.onSnapshot(q, (snap) => {
                    setResults(snap.docs.map(d => ({id: d.id, ...d.data()})));
                }, (err) => console.error("Firestore Listen Error", err));
            }, [fb, user]);

            const handleStart = (e) => {
                e.preventDefault();
                const num = regData.mobile.trim();

                    alert("ക്ഷമിക്കണം, ഈ മൊബൈൽ നമ്പർ ലിസ്റ്റിൽ ഇല്ല.");
                    return;
                }
                setView('quiz');
            };

            const submitExam = async () => {
                let score = 0;
                QUESTIONS.forEach((q, i) => { if(answers[i] === q.correct) score++; });
                
                try {
                    await fb.firebase.addDoc(fb.firebase.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'exam_results'), {
                        uid: user.uid,
                        name: regData.name,
                        place: regData.place,
                        mobile: regData.mobile,
                        score,
                        total: QUESTIONS.length,
                        timestamp: fb.firebase.serverTimestamp(),
                        isApproved: false
                    });
                    setView('done');
                } catch (e) {
                    alert("Submission failed. Check connection.");
                }
            };

                </div>
            );

            if (view === 'register') return (

                        <form onSubmit={handleStart} className="space-y-4">

                            <input required placeholder="സ്ഥലം" className="w-full p-4 rounded-xl bg-slate-50 border-0" value={regData.place} onChange={e => setRegData({...regData, place: e.target.value})} />
                            <input required placeholder="മൊബൈൽ (966-XXXXXXXXX)" className="w-full p-4 rounded-xl bg-slate-50 border-0" value={regData.mobile} onChange={e => setRegData({...regData, mobile: e.target.value})} />

                        <button onClick={() => setView('admin')} className="w-full mt-4 text-slate-400 text-sm font-bold">Admin Dashboard</button>

                </div>

                                </button>
                            ))}

                    </div>

                        <button disabled={currentQ === 0} onClick={() => setCurrentQ(currentQ - 1)} className="flex-1 bg-white p-4 rounded-xl font-bold">Back</button>
                        {currentQ < QUESTIONS.length - 1 ? (
                            <button onClick={() => setCurrentQ(currentQ + 1)} className="flex-1 bg-blue-600 text-white p-4 rounded-xl font-bold">Next</button>
                        ) : (
                            <button onClick={submitExam} className="flex-1 bg-green-600 text-white p-4 rounded-xl font-bold">Submit</button>
                        )}
                    </div>
                </div>
            );

            if (view === 'done') return (
                <div className="h-screen flex items-center justify-center p-4 text-center">
                    <div className="glass-card p-10 rounded-[3rem] shadow-2xl">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">✓</div>
                        <h2 className="text-2xl font-black mb-2">സമർപ്പിച്ചു!</h2>
                        <p className="text-slate-500 mb-6">നിങ്ങളുടെ ഉത്തരങ്ങൾ ലഭിച്ചു. ഫലം പിന്നീട് അറിയിക്കുന്നതാണ്.</p>
                        <button onClick={() => window.location.reload()} className="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold">Close</button>
                    </div>
                </div>
            );

            if (view === 'admin') return (
                <div className="p-4 max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-black">Admin Dashboard</h1>
                        <button onClick={() => setView('register')} className="text-blue-600 font-bold underline">Exit</button>
                    </div>
                    <div className="bg-white rounded-3xl shadow overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b">
                                <tr>
                                    <th className="p-4">Name</th>
                                    <th className="p-4">Score</th>
                                    <th className="p-4">Time</th>
                                </tr>
                            </thead>
                            <tbody>
                                {results.map(r => (
                                    <tr key={r.id} className="border-b">
                                        <td className="p-4"><div>{r.name}</div><div className="text-xs text-slate-400">{r.mobile}</div></td>
                                        <td className="p-4 font-black">{r.score} / {r.total}</td>
                                        <td className="p-4 text-xs">{r.timestamp?.toDate().toLocaleString()}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
