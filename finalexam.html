<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>velichamramadan2026 ക്വിസ് പോർട്ടൽ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap');
        body { font-family: 'Manjari', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPHM4eHRhRPyA-JFDXMrbuFIeMvnGByts",
            authDomain: "velichamsaudionline-66fc0.firebaseapp.com",
            projectId: "velichamsaudionline-66fc0",
            storageBucket: "velichamsaudionline-66fc0.firebasestorage.app",
            messagingSenderId: "414471469839",
            appId: "1:414471469839:web:d4ad0bd9d8c31dfe85dc7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const resultsCol = collection(db, "artifacts/thelightjuniors/public/data/quiz_results");

        const ALLOWED_MOBILES = ["966541303157", "917034253576", "919744205385"];
        let studentData = {};
        let selections = Array(10).fill(null);
        let currentQ = 0;

        const questions = [
            { q: "സ്വർഗ്ഗവാസികൾക്ക് കുടിക്കാൻ നൽകുന്ന പാനീയത്തിൽ ചേർത്തിട്ടുള്ളത്?", a: "ശുദ്ധമായ പാനീയം", b: "ഇഞ്ചി ചേർത്ത പാനീയം", c: "കർപ്പൂരം ചേർത്ത പാനീയം", d: "കയ്പ്പുള്ള പാനീയം", correct: "b" },
            { q: "സ്വർഗ്ഗത്തിലെ അതിമനോഹരമായ നീരുറവയുടെ പേരെന്താണ്?", a: "കൗസർ", b: "സംസം", c: "തസ്നീം", d: "സൽസബീൽ", correct: "d" },
            // ... (Additional questions follow the same pattern)
        ];

        // STUDENT LOGIC
        window.startQuiz = async () => {
            const name = document.getElementById('name').value.trim();
            const place = document.getElementById('place').value.trim();
            const mobile = document.getElementById('mobile').value.replace(/\D/g, '');

            if(!ALLOWED_MOBILES.includes(mobile)) return alert("ഈ മൊബൈൽ നമ്പറിന് പ്രവേശനമില്ല.");
            
            // Check if already submitted
            const qSnap = await getDocs(query(resultsCol, where("mobile", "==", mobile)));
            if(!qSnap.empty) return alert("നിങ്ങൾ ഇതിനകം ക്വിസ് പൂർത്തിയാക്കി കഴിഞ്ഞു.");

            studentData = { name, place, mobile, approved: false };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        window.renderQuestion = () => {
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = q.q;
            ['a','b','c','d'].forEach(l => {
                const btn = document.getElementById('opt-'+l);
                btn.innerText = q[l];
                btn.className = selections[currentQ] === l ? "w-full p-4 border-2 border-teal-600 bg-teal-50 rounded-xl" : "w-full p-4 border rounded-xl bg-white";
            });
        };

        window.selectOpt = (opt) => { selections[currentQ] = opt; renderQuestion(); };
        
        window.goNext = () => {
            if (currentQ < 9) { currentQ++; renderQuestion(); } 
            else { showReview(); }
        };

        window.showReview = () => {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.remove('hidden');
            const list = document.getElementById('review-list');
            list.innerHTML = questions.map((q, i) => `
                <div class="p-4 bg-white rounded-lg mb-2 border">
                    <p class="font-bold text-sm">${i+1}. ${q.q}</p>
                    <select onchange="updateSelection(${i}, this.value)" class="mt-2 text-xs border p-1 rounded">
                        <option value="a" ${selections[i]==='a'?'selected':''}>A: ${q.a}</option>
                        <option value="b" ${selections[i]==='b'?'selected':''}>B: ${q.b}</option>
                        <option value="c" ${selections[i]==='c'?'selected':''}>C: ${q.c}</option>
                        <option value="d" ${selections[i]==='d'?'selected':''}>D: ${q.d}</option>
                    </select>
                </div>
            `).join('');
        };

        window.updateSelection = (index, val) => { selections[index] = val; };

        window.submitQuiz = async () => {
            const score = selections.filter((s, i) => s === questions[i].correct).length;
            await addDoc(resultsCol, { ...studentData, selections, score, at: serverTimestamp() });
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
        };

        // ADMIN LOGIC
        window.checkAdmin = () => {
            const pw = prompt("Password നൽകുക:");
            if(pw === "admin456") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                loadAdminData();
            }
        };

        async function loadAdminData() {
            const snap = await getDocs(resultsCol);
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            snap.forEach(docSnap => {
                const d = docSnap.data();
                tbody.innerHTML += `
                    <tr class="border-b text-xs">
                        <td class="p-2">${d.name}</td>
                        <td class="p-2">${d.score}/10</td>
                        <td class="p-2">${d.approved ? '✅ Approved' : '⏳ Pending'}</td>
                        <td class="p-2 space-x-2">
                            <button onclick="deleteEntry('${docSnap.id}')" class="text-red-500">Delete</button>
                            ${!d.approved ? `<button onclick="approveEntry('${docSnap.id}')" class="text-teal-600">Approve</button>` : ''}
                        </td>
                    </tr>`;
            });
        }

        window.approveAll = async () => {
            const snap = await getDocs(resultsCol);
            const batch = writeBatch(db);
            snap.forEach(d => batch.update(d.ref, { approved: true }));
            await batch.commit();
            loadAdminData();
        };

        window.exportExcel = async () => {
            const snap = await getDocs(resultsCol);
            const data = snap.docs.map(doc => {
                const d = doc.data();
                const row = { Name: d.name, Place: d.place, Mobile: d.mobile, Score: d.score, Time: d.at?.toDate().toLocaleString() };
                questions.forEach((q, i) => row[`Q${i+1}`] = d.selections[i]);
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, "Quiz_Results.xlsx");
        };

        window.deleteEntry = async (id) => { if(confirm("Delete ചെയ്യണോ?")) { await deleteDoc(doc(db, "artifacts/thelightjuniors/public/data/quiz_results", id)); loadAdminData(); } };
        window.approveEntry = async (id) => { await updateDoc(doc(db, "artifacts/thelightjuniors/public/data/quiz_results", id), { approved: true }); loadAdminData(); };

        signInAnonymously(auth);
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex flex-col items-center">
    <div class="max-w-xl w-full glass rounded-3xl shadow-xl overflow-hidden border">
        <div class="p-6">
            <div id="login-screen" class="space-y-4">
                <h1 class="text-center font-bold text-teal-800 text-xl mb-6">TLJ ക്വിസ്</h1>
                <input type="text" id="name" placeholder="Name" class="w-full p-3 border rounded-xl">
                <input type="text" id="place" placeholder="Place" class="w-full p-3 border rounded-xl">
                <input type="text" id="mobile" placeholder="Mobile (eg: 966541303157)" class="w-full p-3 border rounded-xl">
                <button onclick="startQuiz()" class="w-full bg-teal-700 text-white p-4 rounded-xl font-bold">Start</button>
                <button onclick="checkAdmin()" class="w-full text-slate-400 text-xs mt-4">Admin Login</button>
            </div>

            <div id="quiz-screen" class="hidden">
                <p id="q-text" class="font-bold mb-6"></p>
                <div class="space-y-2">
                    <button id="opt-a" onclick="selectOpt('a')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-b" onclick="selectOpt('b')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-c" onclick="selectOpt('c')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-d" onclick="selectOpt('d')" class="w-full p-4 border rounded-xl"></button>
                </div>
                <div class="flex justify-between mt-6">
                    <button onclick="showReview()" class="text-teal-600 text-sm">Jump to Review</button>
                    <button onclick="goNext()" class="bg-teal-800 text-white px-6 py-2 rounded-lg">Next</button>
                </div>
            </div>

            <div id="review-screen" class="hidden">
                <h2 class="font-bold mb-4">Review Your Answers</h2>
                <div id="review-list" class="max-h-60 overflow-y-auto mb-4"></div>
                <button onclick="submitQuiz()" class="w-full bg-teal-700 text-white p-4 rounded-xl font-bold">Submit
