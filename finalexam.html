<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Light Juniors - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manjari:wght@400;700&display=swap');
        body { font-family: 'Manjari', sans-serif; background-color: #f0f9ff; }
        .glass { background: rgba(255, 255, 255, 1); border: 1px solid #e0e7ff; }
        .blue-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, where, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPHM4eHRhRPyA-JFDXMrbuFIeMvnGByts",
            authDomain: "velichamsaudionline-66fc0.firebaseapp.com",
            projectId: "velichamsaudionline-66fc0",
            storageBucket: "velichamsaudionline-66fc0.firebasestorage.app",
            messagingSenderId: "414471469839",
            appId: "1:414471469839:web:d4ad0bd9d8c31dfe85dc7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const resultsCol = collection(db, "artifacts/thelightjuniors/public/data/quiz_results");

        // CLEANED ALLOWED LIST (No dashes for perfect matching)
        const ALLOWED_MOBILES = ["966541303157", "917034253576", "919744205385"];
        let studentData = {};
        let selections = Array(10).fill(null);
        let currentQ = 0;

        const questions = [
            { q: "................ എന്നും, ................ എന്നും, ................ എന്നും ഖുർആൻ മുഖേന സത്യം ചെയ്തു കൊണ്ടാണ് അല്ലാഹു സൂറത്തു യാസീൻ ആരംഭിക്കുന്നത്. താഴെ നൽകിയവയിൽ വിട്ടഭാഗങ്ങളോട് യോജിക്കാത്തത് ഏത് ?", a: "‘യാസീൻ’ എന്നാൽ അർത്ഥമാക്കുന്നത് ‘ഹേ, മനുഷ്യാ’ എന്നാണ്", b: "നബി (സ) അല്ലാഹുവിൻറെ റസൂലാണ്", c: "നബി (സ) സ്വീകരിച്ചിട്ടുള്ള മാർഗം യാതൊരു വക്രതയുമില്ലാത്ത നേരായ മാർഗമാണ്", d: "അത് (ഖുർആൻ) അല്ലാഹു അവതരിപ്പിച്ചത് തന്നെയാണ്", correct: "a" },
            { q: "..................... എന്നു പറഞ്ഞതിൻറെ ഉദ്ദേശം, മേലിൽ ഹൃദയപരിവർത്തനം വന്ന് നന്നായിത്തീരുവാൻ മാർഗമില്ലാത്തവിധം അവരുടെ ഹൃദയങ്ങൾ ദൂഷിച്ചുപോയിട്ടുണ്ടെന്നും, അതിനാൽ ശിക്ഷയെ സംബന്ധിച്ച താക്കീതു അവരിൽ ബാധകമായിക്കഴിഞ്ഞിട്ടുണ്ടെന്നും ആകുന്നു.", a: "എനി അവർ വിശ്വസിക്കുകയില്ല (فَهُمْ لَا يُؤْمِنُونَ)", b: "വാക്കു സ്ഥിരപ്പെട്ടു (حَقَّ الْقَوْلُ)", c: "അതിനാൽ അവർ അശ്രദ്ധരാണ് (فَهُمْ غَافِلُونَ)", d: "അവരിൽ സമമാണ് (سَوَاءٌ عَلَيْهِمْ)", correct: "b" },
            { q: "ആ മുശ്‌രിക്കുകളെ താക്കീതു ചെയ്താലും ഇല്ലെങ്കിലും കാര്യമില്ല, അവർ വിശ്വസിക്കില്ല. കാരണം അവരുടെ ഹൃദയം അത്രത്തോളം കഠിനമായിരിക്കുന്നു. ഇത് വ്യക്തമാക്കാൻ അല്ലാഹു പറയുന്ന ഉപമകളിൽ നിന്നും ചില പ്രയോഗങ്ങളെ താഴെ നൽകുന്നു, അവയിൽ പെടാത്തത് ഏത്?", a: "കഴുത്തുകളിൽ താടിയെല്ലുകൾ വരെയുള്ള ആമങ്ങൾ ഏർപ്പെടുത്തി", b: "അതിനാൽ അവർ തലപൊക്കപ്പെട്ടവരാകുന്നു", c: "മുമ്പിൽ ഒരു തടവും പിമ്പിൽ ഒരു തടവും നൽകി അവരെ മൂടിയിരിക്കുന്നു", d: "അതിനാൽ അവർ അനുസരണയുള്ളവരാണ്", correct: "d" },
            { q: "ഒരാളൊരു നല്ല നടപടി ക്രമം നടപ്പിലാക്കിയാൽ അയാൾക്ക് ലഭിക്കുന്ന പ്രതിഫലമായി ബന്ധപ്പെട്ട് ശരിയായത് ..........", a: "അവന്നു അതിൻറെ പ്രതിഫലമുണ്ട്", b: "അവന്നു ശേഷം അതനുസരിച്ച് പ്രവർത്തിക്കുന്നവരുടെ പ്രതിഫലവുമുണ്ട്", c: "അവരുടെ പ്രതിഫലങ്ങളിൽ ഒട്ടും കുറവ് വരാതെതന്നെ അവന്നു പ്രതിഫലം ഉണ്ടായിരിക്കും", d: "എല്ലാം ശരിയാണ്", correct: "d" },
            { q: "ദൂതന്മാരെ കള്ളവാക്കിയ ജനതയുടെ ഒരു പ്രസ്താവനയാണ്; \"...................... ൽ നിന്ന് നിങ്ങൾക്ക് തീർച്ചയായും വേദനയേറിയ ശിക്ഷ ബാധിക്കുന്നതാണ്\". ഇവിടെ വിട്ടഭാഗത്ത് ഉദ്ദേശിച്ചത് ആരെയാണ്?", a: "അല്ലാഹുവിൽ നിന്ന്", b: "ആ ജനതയിൽ നിന്ന്", c: "ഫിർഔനിൽ നിന്ന്", d: "സ്വാലിഹു (അ) നബിയുടെ ജനതയിൽ നിന്ന്", correct: "b" },
            { q: "പട്ടണത്തിൻറെ അങ്ങേ അറ്റത്തു നിന്ന് ഓടി വന്ന മനുഷ്യൻ ആ ജനതയോട് ഉപദേശിച്ച ചില വാക്യങ്ങളെ നൽകുന്നു. ഒന്ന് അവയിൽ പെടുന്നില്ല, ഏത്?", a: "അവന്നു പുറമെ വല്ല ദൈവങ്ങളെയും ഞാൻ സ്വീകരിക്കുകയോ?", b: "എൻറെ ജനങ്ങൾ അറിഞ്ഞിരുന്നുവെങ്കിൽ നന്നായേനെ", c: "എന്നെ സൃഷ്ടിച്ചുണ്ടാക്കിയവനെ ഞാൻ ആരാധന ചെയ്യാതിരിക്കുവാൻ എനിക്ക് എന്താണ് തടസ്സം", d: "നിശ്ചയമായും ഞാൻ നിങ്ങളുടെ രക്ഷിതാവിൽ വിശ്വസിച്ചിരിക്കുന്നു", correct: "b" },
            { q: "ആ ജനതയെ അല്ലാഹു വമ്പിച്ച ശിക്ഷ മൂലം നശിപ്പിക്കാനുള്ള കാരണം എന്തായിരുന്നു?", a: "അവരിലേക്ക് വന്ന ദൂതന്മാരെ കല്ലെറിഞ്ഞു കൊല്ലുമെന്ന് ഭീഷണിപ്പെടുത്തി", b: "ആദ്യ രണ്ടു ദൂതന്മാരെ അവർ ആദ്യമേ കൊന്നു കളഞ്ഞു", c: "പട്ടണത്തിലെ അങ്ങേ അറ്റത്തിൽ നിന്നും ഓടി വന്ന മൂന്നാമത്തെ ദൂതനെ ആക്രമിച്ചു", d: "അവരിലേക്ക് വന്ന ദൂതന്മാരെ ധിക്കരിക്കുകയും ഉപദേഷ്ടാവിനെ ആക്രമിക്കുകയും ചെയ്തു", correct: "d" },
            { q: "\"എല്ലാ ഇണവർഗ്ഗങ്ങളെയും സൃഷ്ടിച്ചിട്ടുള്ളവൻ മഹാ പരിശുദ്ധനത്രെ\"; വചനത്തിൽ വന്നിട്ടില്ലാത്തത് ഏത്?", a: "ഭൂമി ഉൽപാദിപ്പിക്കുന്നതിൽ നിന്ന്", b: "അവരുടെ ദേഹങ്ങളിൽ നിന്ന്", c: "അവർക്ക് അറിയുന്നവയിൽനിന്ന്", d: "അവർക്ക് അറിഞ്ഞുകൂടാത്തവയിൽ നിന്ന്", correct: "c" },
            { q: "സൂര്യനും ചന്ദ്രനും ഭൂമിയും രാവും പകലും എല്ലാം ബുദ്ധി വർഗ്ഗത്തെപ്പോലെ അത്തതിൻറെ ചലനങ്ങൾ നിർവഹിച്ചു കൊണ്ടിരിക്കുന്നു എന്ന് സൂചന നൽകുന്ന വചന ഭാഗം ഏത് ?", a: "وَالشَّمْسُ تَجْرِي لِمُسْتَقَرٍّ لَّهَا സൂര്യൻ അതിൻറെ ഒരു താവളത്തിലേക്കു ചലിച്ചു കൊണ്ടിരിക്കുന്നു", b: "لَا الشَّمْسُ يَنبَغِي لَهَا أَن تُدْرِكَ الْقَمَرَ സൂര്യനാകട്ടെ അതിന് ചന്ദ്രനെ പ്രാപിക്കുവാൻ പറ്റുകയില്ല", c: "وَلَا اللَّيْلُ سَابِقُ النَّهَارِ രാത്രി പകലിനെ മുൻകടക്കുന്നതുമല്ല", d: "وَكُلٌّ فِي فَلَكٍ يَسْبَحُونَ എല്ലാം ഓരോ സഞ്ചാര മണ്ഡലത്തിൽ നീന്തി കൊണ്ടിരിക്കുന്നു.", correct: "d" },
            { q: "മുൻസമുദായങ്ങൾക്ക് ബാധിച്ചതു പോലെയുള്ള ഐഹിക ശിക്ഷകളെ നിങ്ങൾ സൂക്ഷിക്കണം, വരാനിരിക്കുന്ന പരലോക ശിക്ഷയെയും നിങ്ങൾ സൂക്ഷിക്കണം, എന്നാൽ നിങ്ങൾ ................", a: "സൂക്ഷ്മതയുള്ളവരായേക്കാം", b: "വിജയികളായേക്കാം", c: "കരുണ ചെയ്യപ്പെട്ടേക്കാം", d: "നേർവഴി കാണിക്കപ്പെട്ടേക്കാം", correct: "c" }
        ];

        window.startQuiz = async () => {
            const name = document.getElementById('name').value.trim();
            const place = document.getElementById('place').value.trim();
            // This strips all non-numeric characters (dashes, spaces) for the check
            const mobile = document.getElementById('mobile').value.replace(/\D/g, '');

            if(!ALLOWED_MOBILES.includes(mobile)) {
                return alert("ഈ മൊബൈൽ നമ്പറിന് പ്രവേശനമില്ല.");
            }
            
            // save to cache once validated
            localStorage.setItem('tlj_student', JSON.stringify({ name, place, raw_mobile: document.getElementById('mobile').value }));
            
            const qSnap = await getDocs(query(resultsCol, where("mobile", "==", mobile)));
            if(!qSnap.empty) {
                const docData = qSnap.docs[0].data();
                if (docData.approved) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('student-result-screen').classList.remove('hidden');
                    document.getElementById('student-score-display').innerText = `${docData.score}/10`;
                    return;
                } else {
                    return alert("നിങ്ങൾ ഇതിനകം ക്വിസ് പൂർത്തിയാക്കി കഴിഞ്ഞു. റിസൾട്ട് അഡ്മിൻ അപ്രൂവലിനായി കാത്തിരിക്കുന്നു.");
                }
            }

            if (!name || !place) {
                return alert("പേരും സ്ഥലവും നൽകുക.");
            }

            studentData = { name, place, mobile, approved: false };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        window.renderQuestion = () => {
            const q = questions[currentQ];
            document.getElementById('q-number').innerText = `Question ${currentQ + 1} of 10`;
            document.getElementById('q-text').innerText = `${currentQ + 1}. ${q.q}`;
            ['a','b','c','d'].forEach(l => {
                const btn = document.getElementById('opt-'+l);
                btn.innerText = `${l.toUpperCase()}. ${q[l]}`;
                btn.className = selections[currentQ] === l 
                    ? "w-full p-4 border-2 border-blue-600 bg-blue-50 text-blue-900 rounded-xl text-left transition-all" 
                    : "w-full p-4 border border-slate-200 bg-white text-slate-700 rounded-xl text-left hover:border-blue-300 transition-all";
            });
            
            document.getElementById('prev-btn').classList.toggle('hidden', currentQ === 0);
            if(currentQ === 9) {
                document.getElementById('next-btn').innerText = "റിവ്യൂവിലേക്ക്";
            } else {
                document.getElementById('next-btn').innerText = "അടുത്തത്";
            }
        };

        window.selectOpt = (opt) => { selections[currentQ] = opt; renderQuestion(); };
        
        window.goNext = () => {
            if (currentQ < 9) { currentQ++; renderQuestion(); } 
            else { showReview(); }
        };

        window.goPrev = () => {
            if (currentQ > 0) { currentQ--; renderQuestion(); }
        };

        window.goBackToQuiz = () => {
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        window.showReview = () => {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.remove('hidden');
            const list = document.getElementById('review-list');
            list.innerHTML = questions.map((q, i) => `
                <div class="p-4 bg-white rounded-lg mb-3 border border-blue-100 shadow-sm">
                    <p class="font-bold text-sm text-slate-800">${i+1}. ${q.q}</p>
                    <select onchange="updateSelection(${i}, this.value)" class="mt-2 w-full text-xs border border-blue-200 p-2 rounded-lg bg-blue-50 text-blue-900">
                        <option value="a" ${selections[i]==='a'?'selected':''}>A. ${q.a}</option>
                        <option value="b" ${selections[i]==='b'?'selected':''}>B. ${q.b}</option>
                        <option value="c" ${selections[i]==='c'?'selected':''}>C. ${q.c}</option>
                        <option value="d" ${selections[i]==='d'?'selected':''}>D. ${q.d}</option>
                    </select>
                </div>
            `).join('');
        };

        window.updateSelection = (index, val) => { selections[index] = val; };

        window.submitQuiz = async () => {
            const score = selections.filter((s, i) => s === questions[i].correct).length;
            await addDoc(resultsCol, { ...studentData, selections, score, at: serverTimestamp() });
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
        };

        // ADMIN LOGIC
        window.checkAdmin = () => {
            const pw = prompt("Password നൽകുക:");
            if(pw === "admin456") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                loadAdminData();
            }
        };

        async function loadAdminData() {
            const snap = await getDocs(resultsCol);
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            snap.forEach(docSnap => {
                const d = docSnap.data();
                tbody.innerHTML += `
                    <tr class="border-b border-blue-50 text-[11px]">
                        <td class="p-3 font-medium">${d.name}</td>
                        <td class="p-3 text-slate-500 tracking-wider">${d.mobile}</td>
                        <td class="p-3 font-bold text-blue-600">${d.score}/10</td>
                        <td class="p-3">${d.approved ? '<span class="text-green-600">Approved</span>' : '<span class="text-amber-500">Pending</span>'}</td>
                        <td class="p-3 flex gap-2">
                            <button onclick="deleteEntry('${docSnap.id}')" class="text-red-500 hover:underline">Delete</button>
                            ${!d.approved ? `<button onclick="approveEntry('${docSnap.id}')" class="text-blue-600 font-bold hover:underline">Approve</button>` : ''}
                        </td>
                    </tr>`;
            });
        }

        window.exportExcel = async () => {
            const snap = await getDocs(resultsCol);
            const data = snap.docs.map(doc => {
                const d = doc.data();
                const row = { Name: d.name, Place: d.place, Mobile: d.mobile, Score: d.score, Time: d.at?.toDate().toLocaleString() };
                questions.forEach((q, i) => row[`Q${i+1}`] = d.selections[i] ? d.selections[i].toUpperCase() : 'N/A');
                return row;
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "QuizResults");
            XLSX.writeFile(wb, "TLJ_Results.xlsx");
        };

        window.approveAll = async () => {
            if(!confirm("എല്ലാ വിദ്യാർത്ഥികളെയും അപ്രൂവ് ചെയ്യണോ?")) return;
            const snap = await getDocs(resultsCol);
            const batch = writeBatch(db);
            snap.forEach(d => batch.update(d.ref, { approved: true }));
            await batch.commit();
            loadAdminData();
        };

        window.deleteEntry = async (id) => { if(confirm("ഈ എൻട്രി നീക്കം ചെയ്യണോ?")) { await deleteDoc(doc(db, "artifacts/thelightjuniors/public/data/quiz_results", id)); loadAdminData(); } };
        window.approveEntry = async (id) => { await updateDoc(doc(db, "artifacts/thelightjuniors/public/data/quiz_results", id), { approved: true }); loadAdminData(); };

        window.onload = () => {
            const cached = localStorage.getItem('tlj_student');
            if(cached) {
                try {
                    const data = JSON.parse(cached);
                    if(data.name) document.getElementById('name').value = data.name;
                    if(data.place) document.getElementById('place').value = data.place;
                    if(data.raw_mobile) document.getElementById('mobile').value = data.raw_mobile;
                } catch(e) {}
            }
        };

        signInAnonymously(auth);
    </script>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">
    <div class="max-w-xl w-full glass rounded-[2.5rem] shadow-2xl overflow-hidden">
        <div class="blue-gradient p-8 text-center text-white">
            <h1 class="text-2xl font-bold">The Light Juniors</h1>
            <p class="text-blue-100 text-xs mt-1">Quiz Portal 2026</p>
        </div>

        <div class="p-8">
            <div id="login-screen" class="space-y-4">
                <input type="text" id="name" placeholder="പൂർണ്ണ നാമം (Name)" class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="text" id="place" placeholder="സ്ഥലം (Place)" class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <input type="text" id="mobile" placeholder="മൊബൈൽ (eg: 966541303157)" class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="startQuiz()" class="w-full blue-gradient text-white p-5 rounded-2xl font-bold shadow-lg hover:scale-[1.02] active:scale-95 transition-all">പ്രവേശിക്കുക</button>
                <button onclick="checkAdmin()" class="w-full text-slate-400 text-[10px] mt-6 hover:text-blue-500 uppercase tracking-widest">Admin Access</button>
            </div>

            <div id="quiz-screen" class="hidden">
                <div class="mb-4 text-center">
                    <span id="q-number" class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider"></span>
                </div>
                <div id="q-text" class="font-bold text-slate-800 text-lg mb-8 leading-relaxed"></div>
                <div class="space-y-3">
                    <button id="opt-a" onclick="selectOpt('a')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-b" onclick="selectOpt('b')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-c" onclick="selectOpt('c')" class="w-full p-4 border rounded-xl"></button>
                    <button id="opt-d" onclick="selectOpt('d')" class="w-full p-4 border rounded-xl"></button>
                </div>
                <div class="flex justify-between items-center mt-10">
                    <button id="prev-btn" onclick="goPrev()" class="bg-slate-200 text-slate-700 px-6 py-3 rounded-xl font-bold shadow-sm hidden transition-colors hover:bg-slate-300">മുമ്പത്തെ</button>
                    <!-- hidden sm:block added to hide link on very small screens if needed, else mx-auto keeps it centered -->
                    <button onclick="showReview()" class="text-blue-600 text-[10px] sm:text-xs font-bold underline mx-auto">സബ്മിറ്റ് ഏരിയ</button>
                    <button id="next-btn" onclick="goNext()" class="blue-gradient text-white px-6 py-3 rounded-xl font-bold shadow-md transition-transform hover:scale-105">അടുത്തത്</button>
                </div>
            </div>

            <div id="review-screen" class="hidden">
                <h2 class="font-bold text-slate-800 mb-6 text-center">നിങ്ങളുടെ ഉത്തരങ്ങൾ പരിശോധിക്കുക</h2>
                <div id="review-list" class="max-h-[350px] overflow-y-auto mb-6 pr-2"></div>
                <div class="flex gap-4">
                    <button onclick="goBackToQuiz()" class="w-1/3 bg-slate-200 text-slate-700 p-5 rounded-2xl font-bold shadow-sm transition-colors hover:bg-slate-300">തിരികെ</button>
                    <button onclick="submitQuiz()" class="w-2/3 blue-gradient text-white p-5 rounded-2xl font-bold shadow-lg transition-transform hover:scale-[1.02]">ഫൈനൽ സബ്മിറ്റ്</button>
                </div>
            </div>

            <div id="admin-screen" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-bold text-blue-900">Admin Control</h2>
                    <div class="flex gap-2">
                        <button onclick="location.reload()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-sm hover:bg-blue-700 transition-colors">HOME</button>
                        <button onclick="exportExcel()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-sm hover:bg-green-700 transition-colors">EXCEL REPORT</button>
                    </div>
                </div>
                <button onclick="approveAll()" class="w-full bg-blue-100 text-blue-700 py-3 rounded-xl mb-6 text-xs font-bold hover:bg-blue-200 transition-colors">APPROVE ALL STUDENTS</button>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] text-slate-500 border-b border-blue-100 uppercase bg-blue-50/50">
                                <th class="p-3">Name</th>
                                <th class="p-3">Mobile</th>
                                <th class="p-3">Score</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="finish-screen" class="hidden text-center py-10">
                <h2 class="text-2xl font-bold text-green-600 mb-4">പരീക്ഷ പൂർത്തിയായി!</h2>
                <p class="text-slate-600">അഡ്മിൻ അപ്രൂവ് ചെയ്ത ശേഷം നിങ്ങളുടെ മാർക്ക് പരിശോധിക്കാവുന്നതാണ്.</p>
                <button onclick="location.reload()" class="mt-8 text-blue-600 text-xs font-bold underline">Home</button>
            </div>

            <div id="student-result-screen" class="hidden text-center py-10">
                <h2 class="text-2xl font-bold text-blue-800 mb-4">നിങ്ങളുടെ റിസൾട്ട്</h2>
                <div class="text-6xl font-bold text-blue-600 mb-2" id="student-score-display">0/10</div>
                <p class="text-slate-600 font-medium">അഭിനന്ദനങ്ങൾ!</p>
                <button onclick="location.reload()" class="mt-8 text-blue-600 text-xs font-bold underline">Home</button>
            </div>
        </div>
    </div>
</body>
</html>
