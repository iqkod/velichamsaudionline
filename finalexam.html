            const [currentQ, setCurrentQ] = useState(0);
            const [answers, setAnswers] = useState({});
            const [examStatus, setExamStatus] = useState(null); 
            const [allResults, setAllResults] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.EXAM_APP) {
                        setFb(window.EXAM_APP);
                        clearInterval(interval);
                    }
                }, 100);
            }, []);

            useEffect(() => {
                if (!fb) return;
                const initAuth = async () => {
                    try {
                        const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (customToken) {
                            await fb.firebase.signInWithCustomToken(fb.auth, customToken);
                        } else {
                            await fb.firebase.signInAnonymously(fb.auth);
                        }
                        
                        fb.firebase.onAuthStateChanged(fb.auth, (u) => {
                            if (u) {
                                setUser(u);
                                setLoading(false);
                            }
                        });
                    } catch (err) {
                        console.error("Authentication Error:", err);
                        // Show friendly error to user
                        setLoading(false);
                    }
                };
                initAuth();
            }, [fb]);

            // Real-time listener for results
            useEffect(() => {
                if (!fb || !user) return;
                
                // Use strict path as per Rule 1
                const resultsPath = fb.firebase.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'exam_results');
                
                const unsub = fb.firebase.onSnapshot(resultsPath, (snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Client-side filtering/sorting as per Rule 2
                    setAllResults(docs);
                    
                    const myResult = docs.find(r => r.mobile === regData.mobile || r.uid === user.uid);
                    if (myResult) setExamStatus(myResult);
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
                
                return () => unsub();
            }, [fb, user, regData.mobile]);

            const handleRegister = (e) => {
                e.preventDefault();
                const cleanMobile = regData.mobile.trim();
                if (!fb.ALLOWED_NUMBERS.includes(cleanMobile)) {
                    alert("ക്ഷമിക്കണം, ഈ മൊബൈൽ നമ്പർ രജിസ്റ്റർ ചെയ്തിട്ടില്ല.");
                    return;
                }
                setView('quiz');
            };

            const handleAnswer = (idx) => {
                setAnswers({ ...answers, [currentQ]: idx });
            };

            const submitExam = async () => {
                if (!user) return;
                let correctCount = 0;
                fb.QUESTIONS.forEach((q, i) => {
                    if (answers[i] === q.correct) correctCount++;
                });

                const payload = {
                    uid: user.uid,
                    name: regData.name,
                    place: regData.place,
                    mobile: regData.mobile,
                    answers: JSON.stringify(answers), // Serialize complex objects
                    score: correctCount,
                    total: fb.QUESTIONS.length,
                    grace: 0,
                    isApproved: false,
                    timestamp: fb.firebase.serverTimestamp()
                };

                try {
                    await fb.firebase.addDoc(fb.firebase.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'exam_results'), payload);
                    setView('result');
                } catch (err) {
                    console.error("Submission Error:", err);
                }
            };

            const approveResult = async (id, grace = 0) => {
                if (!user) return;
                const docRef = fb.firebase.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'exam_results', id);
                await fb.firebase.updateDoc(docRef, { isApproved: true, grace: parseInt(grace) || 0 });
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="font-bold text-slate-600">പോർട്ടൽ ലോഡ് ചെയ്യുന്നു...</p>
                </div>
            );

            if (view === 'register') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-card p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black text-slate-800 mb-2">വെളിച്ചം ഓൺലൈൻ</h1>
                            <p className="text-slate-500 font-bold">പരീക്ഷാ രജിസ്ട്രേഷൻ</p>
                        </div>
                        <form onSubmit={handleRegister} className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">പേര്</label>
                                <input required type="text" value={regData.name} onChange={e => setRegData({...regData, name: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="നിങ്ങളുടെ പേര്" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">സ്ഥലം</label>
                                <input required type="text" value={regData.place} onChange={e => setRegData({...regData, place: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="നിങ്ങളുടെ സ്ഥലം" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">മൊബൈൽ നമ്പർ (966-XXXXXXXXX)</label>
                                <input required type="text" value={regData.mobile} onChange={e => setRegData({...regData, mobile: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-50 border-0 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="966-XXXXXXXXX" />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-2xl font-black transition-all shadow-lg shadow-blue-200">പരീക്ഷ ആരംഭിക്കുക</button>
                        </form>
                        <button onClick={() => setView('admin')} className="w-full mt-4 text-slate-400 font-bold text-sm hover:text-slate-600 transition-colors">Admin Dashboard</button>
                    </div>
                </div>
            );

            if (view === 'quiz') return (
                <div className="min-h-screen p-4 md:p-10 flex flex-col items-center">
                    <div className="w-full max-w-2xl mb-6 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                        <span className="font-black text-blue-600">ചോദ്യം {currentQ + 1} / {fb.QUESTIONS.length}</span>
                        <div className="flex gap-2">
                            {fb.QUESTIONS.map((_, i) => (
                                <div key={i} className={`w-2 h-2 rounded-full ${i === currentQ ? 'bg-blue-600' : answers[i] !== undefined ? 'bg-green-400' : 'bg-slate-200'}`}></div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="glass-card p-8 md:p-12 rounded-[3rem] w-full max-w-2xl shadow-xl animate-fade-in mb-8">
                        <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-10 leading-relaxed">
                            {fb.QUESTIONS[currentQ].q}
                        </h2>
                        <div className="space-y-4">
                            {fb.QUESTIONS[currentQ].options.map((opt, idx) => (
                                <button key={idx} onClick={() => handleAnswer(idx)} className={`w-full text-left p-5 rounded-2xl font-bold transition-all border-2 flex items-center gap-4 ${answers[currentQ] === idx ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-slate-50 border-transparent text-slate-600 hover:bg-slate-100'}`}>
                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center text-[10px] ${answers[currentQ] === idx ? 'bg-white border-white text-blue-600' : 'border-slate-300 text-slate-400'}`}>
                                        {String.fromCharCode(65 + idx)}
                                    </div>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="w-full max-w-2xl flex justify-between gap-4">
                        <button disabled={currentQ === 0} onClick={() => setCurrentQ(currentQ - 1)} className="flex-1 bg-white text-slate-800 p-5 rounded-2xl font-black disabled:opacity-50 transition-opacity">Back</button>
                        {currentQ < fb.QUESTIONS.length - 1 ? (
                            <button onClick={() => setCurrentQ(currentQ + 1)} className="flex-1 bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-blue-100">Next Question</button>
                        ) : (
                            <button onClick={() => setView('review')} className="flex-1 bg-green-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-green-100">Review & Submit</button>
                        )}
                    </div>
                </div>
            );

            if (view === 'review') return (
                <div className="min-h-screen p-4 md:p-10 max-w-3xl mx-auto animate-fade-in">
                    <h2 className="text-3xl font-black text-slate-800 mb-8">Review Answers</h2>
                    {fb.QUESTIONS.map((q, i) => (
                        <div key={i} className="bg-white p-6 rounded-2xl mb-4 border border-slate-100 flex justify-between items-center cursor-pointer hover:border-blue-300 transition-all" onClick={() => { setCurrentQ(i); setView('quiz'); }}>
                            <div className="flex-1 mr-4">
                                <span className="text-xs font-black text-blue-500 uppercase">Question {i+1}</span>
                                <p className="font-bold text-slate-700 line-clamp-1">{q.q}</p>
                            </div>
                            <div className="shrink-0 bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-sm font-black whitespace-nowrap">
                                {answers[i] !== undefined ? `Option ${String.fromCharCode(65 + answers[i])}` : 'Skipped'}
                            </div>
                        </div>
                    ))}
                    <button onClick={submitExam} className="w-full bg-green-600 text-white p-6 rounded-[2rem] font-black text-xl mt-8 shadow-xl shadow-green-100 active:scale-95 transition-transform">SUBMIT FINAL ANSWERS</button>
                </div>
            );

            if (view === 'result') return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-card p-10 rounded-[3rem] w-full max-w-md text-center shadow-2xl animate-fade-in">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 className="text-3xl font-black text-slate-800 mb-4">പരീക്ഷ പൂർത്തിയായി!</h2>
                        <p className="text-slate-500 font-bold mb-8">നിങ്ങളുടെ ഉത്തരങ്ങൾ സമർപ്പിച്ചു. അഡ്മിൻ അംഗീകരിച്ച ശേഷം ഫലം ഇവിടെ കാണാം.</p>
                        
                        {examStatus?.isApproved && (
                            <div className="bg-blue-50 p-6 rounded-3xl mb-8 animate-fade-in border border-blue-100">
                                <div className="text-5xl font-black text-blue-600 mb-2">{(examStatus.score + (examStatus.grace || 0))} / {examStatus.total}</div>
                                <div className="text-sm font-bold text-slate-400">ആകെ മാർക്ക് (ഗ്രേസ് ഉൾപ്പെടെ)</div>
                                <div className="mt-6 flex justify-between items-center bg-white/50 p-3 rounded-xl border border-blue-50">
                                    <div className="text-left">
                                        <div className="text-[10px] font-black uppercase text-slate-400">Grace Mark</div>
                                        <div className="font-bold text-blue-500">{examStatus.grace || 0}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[10px] font-black uppercase text-slate-400">Percentage</div>
                                        <div className="font-bold text-green-500">{(((examStatus.score + (examStatus.grace || 0)) / examStatus.total) * 100).toFixed(1)}%</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">ലോഗ് ഔട്ട്</button>
                    </div>
                </div>
            );

            if (view === 'admin') return (
                <div className="min-h-screen p-4 md:p-10 max-w-5xl mx-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-10">
                        <h2 className="text-3xl font-black text-slate-800">Admin Dashboard</h2>
                        <button onClick={() => setView('register')} className="text-blue-600 font-bold px-4 py-2 hover:bg-blue-50 rounded-xl transition-colors">Exit Dashboard</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div className="text-slate-400 font-black text-xs uppercase tracking-wider mb-2">Total Participants</div>
                            <div className="text-3xl font-black text-slate-800">{allResults.length}</div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div className="text-slate-400 font-black text-xs uppercase tracking-wider mb-2">Pending Approvals</div>
                            <div className="text-3xl font-black text-orange-500">{allResults.filter(r => !r.isApproved).length}</div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b border-slate-100">
                                    <tr>
                                        <th className="p-5 font-black text-slate-500 uppercase text-[10px]">Student Details</th>
                                        <th className="p-5 font-black text-slate-500 uppercase text-[10px]">Contact</th>
                                        <th className="p-5 font-black text-slate-500 uppercase text-[10px]">Score</th>
                                        <th className="p-5 font-black text-slate-500 uppercase text-[10px]">Grace</th>
                                        <th className="p-5 font-black text-slate-500 uppercase text-[10px]">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {allResults.length === 0 ? (
                                        <tr><td colSpan="5" className="p-10 text-center font-bold text-slate-400">No results found yet.</td></tr>
                                    ) : allResults.map(res => (
                                        <tr key={res.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-colors">
                                            <td className="p-5">
                                                <div className="font-bold text-slate-800">{res.name}</div>
                                                <div className="text-[10px] text-slate-400 font-black uppercase">{res.place}</div>
                                            </td>
                                            <td className="p-5 font-bold text-slate-600 text-sm whitespace-nowrap">{res.mobile}</td>
                                            <td className="p-5">
                                                <span className="font-black text-blue-600">{res.score}</span>
                                                <span className="text-slate-300 mx-1">/</span>
                                                <span className="text-slate-400 font-bold">{res.total}</span>
                                            </td>
                                            <td className="p-5">
                                                <input 
                                                    type="number" 
                                                    placeholder="0"
                                                    disabled={res.isApproved}
                                                    id={`grace-${res.id}`} 
                                                    className="w-16 p-2 rounded-lg bg-slate-100 border-0 outline-none text-center font-bold focus:ring-2 focus:ring-blue-500 disabled:opacity-50" 
                                                />
                                            </td>
                                            <td className="p-5">
                                                {res.isApproved ? (
                                                    <div className="flex items-center gap-2 text-green-600 font-black text-xs">
                                                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                                        Approved ({res.grace})
                                                    </div>
                                                ) : (
                                                    <button 
                                                        onClick={() => approveResult(res.id, document.getElementById(`grace-${res.id}`).value)} 
                                                        className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg shadow-blue-100 transition-all"
                                                    >
                                                        Approve
                                                    </button>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
