<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>വെളിച്ചം ഓൺലൈൻ - ഫൈനൽ പരീക്ഷ</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .loading-spin { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <!-- Initial Static Loading State -->
        <div class="h-screen flex flex-col items-center justify-center bg-slate-50">
            <div class="w-12 h-12 border-4 border-slate-200 loading-spin rounded-full mb-4"></div>
            <p class="text-slate-500 font-bold animate-pulse">Initializing Exam...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Configuration
        const ADMIN_PIN = "1234";
        const QUESTIONS = [
            { q: "മലക്കുകളെയും അവയുടെ സൃഷ്ടിപ്പുമായി ബന്ധപ്പെട്ട ചില സവിശേഷതകൾ താഴെ നൽകിയവയിൽ ഒന്നാം വചനത്തിൽ നിന്നല്ലാത്തത് ഏത്?", options: ["ഈരണ്ടും മുമ്മൂന്നും നന്നാലും ചിറകുകള്‍ ഉള്ളവർ", "പ്രകാശത്താല്‍ സൃഷ്ടിക്കപ്പെട്ടവർ", "ദൂതന്‍മാർ", "സൃഷ്ടിയില്‍ അല്ലാഹു ഉദ്ദേശിക്കുന്നതു അവന്‍ വര്‍ധിപ്പിക്കുന്നു"], correct: 1 },
            { q: "പുനരുത്ഥാനത്തെ എന്തിനോടാണ് അല്ലാഹു ഉപമിക്കുന്നത് ?", options: ["ആകാശത്തുനിന്നും ഭൂമിയില്‍നിന്നും ഉപജീവനം നല്‍കുന്നത്", "നിര്‍ജീവമായ ഭൂമിയെ മഴ പെയ്യിച്ചു ജീവിപ്പിക്കുന്നത്", "ശുദ്ധമായതും കൈപ്പുരസമുള്ളതുമായ രണ്ടു ജലാശയങ്ങൾ സൃഷ്ടിച്ചത്", "സൂര്യനെയും ചന്ദ്രനെയും കീഴ്‌പ്പെടുത്തി തന്നത്"], correct: 1 },
            { q: "അല്ലാഹുവിന് പുറമെ അവർ വിളിച്ചു പ്രാർത്ഥിക്കുന്നവർ ................... പോലും ഉടമപെടുത്തിന്നില്ല. വിട്ടഭാഗത്തിന്റെ അറബി പദം ഏത്?", options: ["തമ്ർ (تمر)", "ഖജൂർ (خجور)", "അജ്‌വ (عജوة)", "ഖിഥ്മീർ (قطمير)"], correct: 3 },
            { q: "ഖിയാമത്തുനാളിൽ .................... അവർ നിഷേധിക്കുകയും ചെയ്യും. എന്തിനെയാണ് അവർ നിഷേധിക്കുന്നത്?", options: ["അവരെ വിളിച്ചു പ്രാര്‍ത്ഥിച്ചതിനെ (ശിർക്കിനെ)", "അവരുടെ പ്രാർത്ഥനയെ", "ശിക്ഷയെ", "നിങ്ങളുടെ ഈ ഉത്തരത്തെ"], correct: 0 },
            { q: "കുറ്റം വഹിക്കുന്ന ഒരു ദേഹവും മറ്റൊന്നിന്റെ കുറ്റം വഹിക്കുകയില്ല. ഈ തത്വത്തെ സൂചിപ്പിക്കുന്ന സൂറത്തു ഫാത്വിറിലെ വചനഭാഗം?", options: ["ഓരോ ആത്മാവും ഒന്നും സമ്പാദിച്ചു വെക്കുകയില്ല", "ഓരോരുത്തര്‍ പ്രവര്‍ത്തിച്ചതിന്റെ ഫലവും അവർക്കുതന്നെ", "കുറ്റം വഹിക്കുന്ന ഒരു ദേഹവും മറ്റൊന്നിന്റെ കുറ്റം വഹിക്കുകയില്ല", "അതിന്റെ കുറ്റം ഞാന്‍ ഏറ്റുകൊള്ളാം"], correct: 2 },
            { q: "അവരുടെ റസൂലുകൾ ..................... അവരുടെ അടുക്കൽ ചെന്നിരുന്നു. വിട്ടഭാഗത്തിൽ വരാത്തത് ഏത്?", options: ["വ്യക്തമായ തെളിവുകള്‍ (الْبَيِّനَاتِ)", "ഏടുകള്‍ (الZُّബُرِ)", "പ്രകാശം നല്‍കുന്ന വേദഗ്രന്ഥം (الْكിتابِ الْمُنِيرِ)", "സമുദായം (أُمَّةٍ)"], correct: 3 },
            { q: "നഷ്ടപ്പെട്ടു പോകുന്നതേയല്ലാത്ത ഒരു വ്യാപാരത്തെ ആഗ്രഹിക്കുന്നവർ ചെയ്യാത്ത കാര്യം ഏത്?", options: ["ഖുർആൻ പാരായണം ചെയ്തുകൊണ്ടിരിക്കുക", "നമസ്കാരം നിലനിർത്തുക", "ദയാനുഗ്രഹത്തിൽ നിന്ന് വർദ്ധിപ്പിച്ചു കൊടുക്കുക", "അല്ലാഹു നൽകിയതിൽ നിന്ന് രഹസ്യമായും പരസ്യമായും ചിലവഴിക്കുക"], correct: 2 },
            { q: "മിതം പാലിക്കുന്നവർ (مُّقْتَصِدٌ) ഖുർആൻ അവകാശപ്പെട്ടവരിൽ എത്രാമത്തെ വിഭാഗമാണ്?", options: ["തങ്ങളോട് തന്നെ അക്രമം പ്രവർത്തിച്ചവർ", "മിതം പാലിക്കുന്നവർ", "സൽക്കർമ്മങ്ങളുമായി മുൻകടന്നവർ", "നിഷേധിച്ചവർ"], correct: 1 },
            { q: "നരകത്തിൽ ലഭിക്കുന്ന ഏറ്റവും എളിയ ശിക്ഷയെന്താണ്?", options: ["അഗ്നി കൊണ്ടുള്ള രണ്ട് ചെരിപ്പുകളും രണ്ട് വാറും", "അഗ്നി കൊണ്ടുള്ള പുതപ്പ്", "ചുട്ടുപഴുത്ത ദണ്ഡ് കൊണ്ടുള്ള മർദ്ദനം", "ചൂടുള്ള വെള്ളം തലയിലൂടെ കോരിയൊഴിക്കും"], correct: 0 },
            { q: "മനുഷ്യർ പ്രവർത്തിച്ചുവെച്ചിട്ടുള്ളതിന് അല്ലാഹു അവരെ പിടികൂടുകയാണെങ്കിൽ ഭൂമുഖത്ത് എന്ത് ബാക്കിയുണ്ടാവില്ല?", options: ["കാര്യം ഉടനെ തീരുമാനിക്കപ്പെടുമായിരുന്നു", "ഭൂമുഖത്ത് ഒരു ജന്തുവെയും അവൻ ബാക്കി വിടുമായിരുന്നില്ല", "ശിക്ഷ ഉടനെ ഇറങ്ങുമായിരുന്നു", "അവർക്കാകട്ടെ ഇട നൽകില്ലായിരുന്നു"], correct: 1 }
        ];

        function App() {
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState('loading');
            const [regData, setRegData] = useState({ name: '', place: '', mobile: '' });
            const [currentQ, setCurrentQ] = useState(0);
            const [answers, setAnswers] = useState({});
            const [results, setResults] = useState([]);
            const [adminPin, setAdminPin] = useState('');

            // Initialization with exponential backoff for the global variables
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js");
                        const { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js");
                        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js");

                        if (typeof __firebase_config === 'undefined') {
                            throw new Error("Firebase config not yet available");
                        }

                        const config = JSON.parse(__firebase_config);
                        const app = initializeApp(config);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'velicham-default';

                        // Auth Logic (Rule 3)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setUser(u);
                                setFb({ db, auth, appId, functions: { collection, addDoc, onSnapshot, serverTimestamp, query, doc, deleteDoc } });
                                setStatus('register');
                            }
                        });

                    } catch (e) {
                        console.error("Initialization failed, retrying...", e);
                        setTimeout(initFirebase, 1000);
                    }
                };
                initFirebase();
            }, []);

            // Data Listener (Rule 1 & 2)
            useEffect(() => {
                if (!user || !fb) return;
                
                const path = ['artifacts', fb.appId, 'public', 'data', 'final_results'];
                const colRef = fb.functions.collection(fb.db, ...path);
                
                const unsubscribe = fb.functions.onSnapshot(colRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setResults(data);
                    const mine = data.find(r => r.userId === user.uid);
                    if (mine) setStatus('done');
                }, (err) => console.error("Snapshot Error:", err));

                return () => unsubscribe();
            }, [user, fb]);

            const submitExam = async () => {
                if (status === 'submitting') return;
                setStatus('submitting');
                
                const score = QUESTIONS.reduce((acc, q, i) => answers[i] === q.correct ? acc + 1 : acc, 0);

                try {
                    const colRef = fb.functions.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'final_results');
                    await fb.functions.addDoc(colRef, {
                        userId: user.uid,
                        ...regData,
                        score,
                        total: QUESTIONS.length,
                        timestamp: fb.functions.serverTimestamp()
                    });
                } catch (e) {
                    console.error("Submit error:", e);
                    setStatus('quiz');
                }
            };

            const myResult = results.find(r => r.userId === user?.uid);

            if (status === 'loading') return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-12 h-12 border-4 border-slate-200 loading-spin rounded-full mb-4"></div>
                    <p className="text-slate-500 font-bold">Connecting to Database...</p>
                </div>
            );

            if (status === 'register') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="glass-card p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl border-white border-4">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-black text-slate-800">വെളിച്ചം ഓൺലൈൻ</h1>
                            <p className="text-blue-600 font-bold text-xs uppercase tracking-widest mt-1">അവസാന പരീക്ഷ</p>
                        </div>
                        <div className="space-y-4">
                            <input placeholder="പേര്" className="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none transition-all" value={regData.name} onChange={e => setRegData({...regData, name: e.target.value})} />
                            <input placeholder="സ്ഥലം" className="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none transition-all" value={regData.place} onChange={e => setRegData({...regData, place: e.target.value})} />
                            <input placeholder="മൊബൈൽ" className="w-full p-4 rounded-xl border-2 border-slate-100 focus:border-blue-500 outline-none transition-all" value={regData.mobile} onChange={e => setRegData({...regData, mobile: e.target.value})} />
                            <button onClick={() => regData.name && setStatus('quiz')} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg transform active:scale-95 transition-transform">തുടങ്ങാം</button>
                            
                            <div className="pt-10 flex flex-col items-center opacity-20 hover:opacity-100 transition-opacity">
                                <input type="password" placeholder="Admin PIN" className="text-[10px] w-20 text-center mb-2 bg-transparent" value={adminPin} onChange={e => setAdminPin(e.target.value)} />
                                <button onClick={() => adminPin === ADMIN_PIN && setStatus('admin')} className="text-[10px] text-slate-500 font-bold uppercase">Dashboard</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (status === 'quiz' || status === 'submitting') return (
                <div className="min-h-screen p-4 md:p-6 flex flex-col items-center bg-slate-50" dir="rtl">
                    <div className="w-full max-w-2xl flex justify-between items-center mb-6">
                        <span className="font-bold text-slate-400">ചോദ്യം {currentQ + 1} / {QUESTIONS.length}</span>
                        <div className="h-2 w-32 bg-slate-200 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-500 transition-all duration-300" style={{width: `${((currentQ+1)/QUESTIONS.length)*100}%`}}></div>
                        </div>
                    </div>
                    <div className="glass-card p-8 md:p-12 rounded-[2.5rem] w-full max-w-2xl shadow-xl border-white border-4 min-h-[450px] flex flex-col">
                        <h2 className="text-xl md:text-2xl font-bold mb-8 text-slate-800 leading-relaxed text-right">{QUESTIONS[currentQ].q}</h2>
                        <div className="space-y-3 mt-auto">
                            {QUESTIONS[currentQ].options.map((opt, i) => (
                                <button key={i} onClick={() => setAnswers({...answers, [currentQ]: i})}
                                    className={`w-full text-right p-5 rounded-2xl border-2 transition-all font-medium ${answers[currentQ] === i ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white border-slate-100 text-slate-600 hover:border-slate-300'}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="w-full max-w-2xl grid grid-cols-2 gap-4 mt-6">
                        <button disabled={currentQ === 0} onClick={() => setCurrentQ(v => v-1)} className="p-4 rounded-xl bg-white text-slate-400 font-bold border border-slate-200">പിന്നിലേക്ക്</button>
                        <button onClick={() => currentQ < QUESTIONS.length - 1 ? setCurrentQ(v => v+1) : submitExam()} 
                            className={`p-4 rounded-xl font-bold text-white shadow-lg transform active:scale-95 transition-all ${currentQ === QUESTIONS.length - 1 ? 'bg-green-600' : 'bg-blue-600'}`}>
                            {status === 'submitting' ? 'സമർപ്പിക്കുന്നു...' : (currentQ === QUESTIONS.length - 1 ? 'പൂർത്തിയാക്കാം' : 'അടുത്തത്')}
                        </button>
                    </div>
                </div>
            );

            if (status === 'done') return (
                <div className="h-screen flex items-center justify-center p-6 bg-slate-50">
                    <div className="glass-card p-12 rounded-[3rem] text-center shadow-2xl max-w-md w-full border-white border-4">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl font-black">✓</div>
                        <h2 className="text-2xl font-black text-slate-800 mb-6">വിജയകരമായി സമർപ്പിച്ചു</h2>
                        <div className="bg-slate-900 p-10 rounded-[2.5rem] text-white shadow-xl">
                            <div className="text-[10px] uppercase tracking-widest text-blue-400 font-bold mb-2">നിങ്ങളുടെ സ്കോർ</div>
                            <div className="text-6xl font-black">{myResult?.score} <span className="text-xl text-slate-500">/ {QUESTIONS.length}</span></div>
                            <div className="mt-6 pt-6 border-t border-slate-800 text-sm text-slate-400">
                                <span className="text-white font-bold">{myResult?.name}</span><br/>{myResult?.place}
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (status === 'admin') return (
                <div className="p-8 bg-slate-50 min-h-screen">
                    <div className="max-w-4xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <div>
                                <h1 className="text-3xl font-black">Results</h1>
                                <p className="text-slate-400 font-bold">{results.length} Submissions</p>
                            </div>
                            <button onClick={() => setStatus('register')} className="bg-white px-6 py-3 rounded-xl font-bold shadow-sm border border-slate-200">Exit</button>
                        </div>
                        <div className="grid gap-4">
                            {results.map(r => (
                                <div key={r.id} className="flex items-center justify-between p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                                    <div>
                                        <div className="font-bold text-lg text-slate-800">{r.name}</div>
                                        <div className="text-xs text-slate-400 font-bold uppercase tracking-wider">{r.place} • {r.mobile}</div>
                                    </div>
                                    <div className="text-2xl font-black text-blue-600">{r.score}/{r.total}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
